# Продакшен-стек RU-сервера (Timeweb): Caddy + Next.js + PostgreSQL.
# Голосовой backend и Redis работают на отдельном зарубежном VPS
# (см. deploy/docker-compose.de.yml) — Caddy проксирует /ws туда,
# frontend ходит в Redis на DE (REDIS_URL в frontend/.env).
#
# Запуск:
#   docker compose -f docker-compose.prod.yml up -d
#
# Требуются файлы окружения:
#   ./.env          — DOMAIN, ACME_EMAIL, POSTGRES_*,
#                     BACKEND_UPSTREAM, DOCKERHUB_USER
#   ./frontend/.env — переменные Next.js
#
# Порт 5432 опубликован для backend на зарубежном VPS.
# ОБЯЗАТЕЛЬНО ограничить доступ файрволом (только IP backend-сервера).

# Ротация логов контейнеров. По умолчанию драйвер json-file пишет без
# ограничений, и долгоживущий контейнер (Caddy и PostgreSQL не пересоздаются
# при выкатке) может незаметно занять весь диск. Якорь, чтобы правило
# не пришлось дублировать в каждом сервисе.
x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # PostgreSQL — данные пользователей, сессий, сообщений
  postgres:
    image: postgres:16
    restart: unless-stopped
    <<: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_trainer}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_trainer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Next.js: REST API + интерфейс. При старте применяет миграции Prisma.
  # Образ собирается в GitHub Actions и публикуется в Docker Hub.
  # Redis — на DE-сервере (REDIS_URL в frontend/.env).
  frontend:
    image: ${DOCKERHUB_USER}/ai-trainer-frontend:latest
    restart: unless-stopped
    <<: *logging
    env_file: ./frontend/.env
    depends_on:
      postgres:
        condition: service_healthy

  # Caddy: единая точка входа, авто-HTTPS.
  # / — на локальный frontend, /ws — на голосовой backend (зарубежный VPS).
  caddy:
    image: caddy:2
    restart: unless-stopped
    <<: *logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
