# Продакшен-стек RU-сервера (Timeweb): Caddy + Next.js + PostgreSQL + Redis.
# Голосовой backend работает на отдельном зарубежном VPS
# (см. deploy/docker-compose.de.yml) — Caddy проксирует /ws туда.
#
# Запуск:
#   docker compose -f docker-compose.prod.yml up -d
#
# Требуются файлы окружения:
#   ./.env          — DOMAIN, ACME_EMAIL, POSTGRES_*, REDIS_PASSWORD,
#                     BACKEND_UPSTREAM, DOCKERHUB_USER
#   ./frontend/.env — переменные Next.js
#
# Порты 5432/6379 опубликованы для backend на зарубежном VPS.
# ОБЯЗАТЕЛЬНО ограничить доступ файрволом (только IP backend-сервера).

services:
  # PostgreSQL — данные пользователей, сессий, сообщений
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_trainer}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_trainer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis — whitelist JWT-токенов, одноразовые ws-токены, состояние сессий.
  # Порт публичный (нужен backend на DE) — пароль обязателен.
  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $${REDIS_PASSWORD:-} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # Next.js: REST API + интерфейс. При старте применяет миграции Prisma.
  # Образ собирается в GitHub Actions и публикуется в Docker Hub.
  frontend:
    image: ${DOCKERHUB_USER}/ai-trainer-frontend:latest
    restart: unless-stopped
    env_file: ./frontend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Caddy: единая точка входа, авто-HTTPS.
  # / — на локальный frontend, /ws — на голосовой backend (зарубежный VPS).
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
