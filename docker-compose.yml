# Локальная инфраструктура для разработки ИИ-тренажёра по продажам.
# Поднимает PostgreSQL и Redis. Значения совпадают с frontend/.env.
# Запуск:   docker compose up -d
# Остановка: docker compose down   (данные сохраняются в volume)

services:
  # База данных PostgreSQL (используется Prisma)
  postgres:
    image: postgres:16
    container_name: ai-trainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_trainer
    ports:
      # Хостовый порт 5433, чтобы не конфликтовать с локально установленным
      # PostgreSQL, который уже занимает 5432.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # Проверяем готовность БД принимать подключения
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_trainer"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (whitelist активных JWT-токенов)
  redis:
    image: redis:7
    container_name: ai-trainer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      # Проверяем, что Redis отвечает на ping
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

# Именованные тома для хранения данных между перезапусками
volumes:
  postgres-data:
  redis-data:
