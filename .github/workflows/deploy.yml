# CI/CD: push в main → сборка образов → автодеплой на оба сервера.
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN — доступ к Docker Hub
#   RU_HOST, DE_HOST                  — адреса серверов
#   DEPLOY_SSH_KEY                    — приватный ключ для входа на оба сервера
#
# Вход только по ключу: парольная аутентификация на серверах отключена.
# Ключ отдельный от личного (комментарий github-actions-deploy в
# authorized_keys), чтобы его можно было отозвать, не трогая доступ людей.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-trainer-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-trainer-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  deploy-de:
    name: Deploy backend (DE)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pull & restart backend
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.DE_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -euo pipefail
            cd ~/ai-trainer
            # Авторизация в Docker Hub: анонимные загрузки ограничены и при
            # 429 pull молча прерывается, оставляя работать старый образ.
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            # Только образ приложения: redis и прочая инфраструктура меняются
            # редко, но их загрузка тратит лимит и может уронить весь pull.
            docker compose pull backend
            docker compose up -d
            # Контейнер должен работать именно на свежескачанном образе.
            # Без этой проверки неудачный деплой выглядел бы успешным.
            running=$(docker inspect -f '{{.Image}}' "$(docker compose ps -q backend)")
            latest=$(docker image inspect -f '{{.Id}}' "$DOCKERHUB_USERNAME/ai-trainer-backend:latest")
            if [ "$running" != "$latest" ]; then
              echo "Ошибка: backend работает на устаревшем образе"
              exit 1
            fi
            docker image prune -f

  deploy-ru:
    name: Deploy frontend (RU)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Pull & restart stack
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.RU_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -euo pipefail
            cd ~/ai-salesperson-trainer
            git pull
            # Авторизация в Docker Hub: анонимные загрузки ограничены и при
            # 429 pull молча прерывается, оставляя работать старый образ.
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            # Только образ приложения: caddy:2 и postgres:16 меняются редко,
            # но их загрузка тратит лимит и может уронить весь pull.
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d
            # Контейнер должен работать именно на свежескачанном образе.
            # Без этой проверки неудачный деплой выглядел бы успешным.
            running=$(docker inspect -f '{{.Image}}' "$(docker compose -f docker-compose.prod.yml ps -q frontend)")
            latest=$(docker image inspect -f '{{.Id}}' "$DOCKERHUB_USERNAME/ai-trainer-frontend:latest")
            if [ "$running" != "$latest" ]; then
              echo "Ошибка: frontend работает на устаревшем образе"
              exit 1
            fi
            docker image prune -f
